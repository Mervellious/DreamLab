<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - DreamLab</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='settings.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="dashboard">

        <!-- Sidebar -->
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <a href="{{ url_for('my_dreams') }}" class="nav-item">
                    <i data-lucide="moon" class="nav-icon"></i>
                    My Dreams
                </a>
                <a href="{{ url_for('nightmares') }}" class="nav-item">
                    <i data-lucide="zap" class="nav-icon"></i>
                    Nightmares
                </a>
                <a href="{{ url_for('sleep_overview') }}" class="nav-item">
                    <i data-lucide="activity" class="nav-icon"></i>
                    Sleep Overview
                </a>
                <a href="{{ url_for('mood_tracker') }}" class="nav-item">
                    <i data-lucide="bar-chart-2" class="nav-icon"></i>
                    Mood Tracker
                </a>
                <a href="{{ url_for('reports') }}" class="nav-item">
                    <i data-lucide="file-text" class="nav-icon"></i>
                    Reports
                </a>
                <a href="/settings" class="nav-item active-nav">
                    <i data-lucide="settings" class="nav-icon"></i>
                    Settings
                </a>
            </nav>
        </aside>

        <!-- Top Nav Icons -->
        <div class="top-nav-icons">
            <a href="{{ url_for('dashboard') }}" class="nav-icon-btn" title="Home">
                <i data-lucide="home"></i>
            </a>
            <a href="{{ url_for('logout') }}" class="nav-icon-btn" title="Log Out">
                <i data-lucide="log-out"></i>
            </a>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <h1 class="page-title">Settings</h1>
            </div>

            <div class="settings-card">

                <!-- Personal Information -->
                <a href="/settings-personal" class="settings-menu-item">
                    <div class="settings-menu-left">
                        <span class="settings-menu-title">Personal Information</span>
                        <span class="settings-menu-preview">First Name &middot; Last Name &middot; Date of Birth</span>
                    </div>
                    <span class="settings-menu-chevron">›</span>
                </a>

                <!-- Login & Security -->
                <a href="/settings-security" class="settings-menu-item">
                    <div class="settings-menu-left">
                        <span class="settings-menu-title">Login &amp; Security</span>
                        <span class="settings-menu-preview">Email Address &middot; Password</span>
                    </div>
                    <span class="settings-menu-chevron">›</span>
                </a>

                <!-- Delete My Account -->
                <a href="/settings-delete" class="settings-menu-item danger">
                    <div class="settings-menu-left">
                        <span class="settings-menu-title">Delete My Account</span>
                    </div>
                    <span class="settings-menu-chevron">›</span>
                </a>

            </div>
        </main>

    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
