<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question 7 - DreamLab</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='q7.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="top-nav-icons">
        <a href="{{ url_for('dashboard') }}" class="nav-icon-btn" title="Home">
            <i data-lucide="home"></i>
        </a>
        <a href="{{ url_for('login') }}" class="nav-icon-btn" title="Log Out">
            <i data-lucide="log-out"></i>
        </a>
    </div>

    <div class="page-wrapper">

        <div class="card">
        <form method="POST" action="/q7" style="display: contents;">

            <p class="question-label">Have you had this dream before?</p>

            <div class="choice-buttons">
                <button type="button" class="choice-btn">No</button>
                <button type="button" class="choice-btn">Yes, once before</button>
                <button type="button" class="choice-btn">Yes, more than once</button>
                <button type="button" class="choice-btn">Not sure</button>
            </div>
            <input type="hidden" id="recurring" name="recurring" value="">

            <div class="pagination">
                <a href="{{ url_for('q6') }}" class="page-btn">
                    <i data-lucide="arrow-left"></i>
                    Back
                </a>
                <button type="submit" class="page-btn">
                    Next
                    <i data-lucide="arrow-right"></i>
                </button>
            </div>

        </form>
        </div>

    </div>

    <script>
        lucide.createIcons();
        document.querySelectorAll('.choice-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const isActive = btn.classList.contains('active');
                document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('active'));
                if (!isActive) {
                    btn.classList.add('active');
                    document.getElementById('recurring').value = btn.textContent.trim();
                } else {
                    document.getElementById('recurring').value = '';
                }
            });
        });
    </script>
</body>
</html>
