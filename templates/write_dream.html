<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write Your Dream - DreamLab</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='write_dream.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="top-nav-icons">
        <a href="{{ url_for('dashboard') }}" class="nav-icon-btn" title="Home">
            <i data-lucide="home"></i>
        </a>
        <a href="{{ url_for('login') }}" class="nav-icon-btn" title="Log Out">
            <i data-lucide="log-out"></i>
        </a>
    </div>

    <div class="page-wrapper">

        <!-- Card -->
        <form method="POST" action="/write_dream">
        <div class="card">

            <!-- Dream Title -->
            <div class="field-group">
                <label class="field-label">Dream Title</label>
                <div class="date-inputs">
                    <input type="text" class="date-input" name="title" placeholder="Title" style="text-align: left;">
                </div>
            </div>

            <!-- Date -->
            <div class="field-group">
                <label class="field-label">Date</label>
                <div class="date-inputs">
                    <input type="text" class="date-input" name="dd" placeholder="DD" maxlength="2">
                    <input type="text" class="date-input" name="mm" placeholder="MM" maxlength="2">
                    <input type="text" class="date-input" name="yyyy" placeholder="YYYY" maxlength="4">
                </div>
            </div>

            <!-- Dream Type -->
            <div class="field-group">
                <p class="question-label">Is it a dream or a nightmare?</p>
                <div class="type-buttons">
                    <button type="button" class="type-btn">Dream</button>
                    <button type="button" class="type-btn">Nightmare</button>
                    <button type="button" class="type-btn">Not Sure</button>
                </div>
                <input type="hidden" id="dream-type" name="dream_type" value="">
            </div>

            <!-- Textarea -->
            <div class="field-group textarea-group">
                <label class="field-label">Please write your dream</label>
                <textarea class="dream-textarea" name="description" rows="6"></textarea>
            </div>

            <!-- Pagination -->
            <div class="pagination">
                <a href="{{ url_for('dashboard') }}" class="page-btn">
                    <i data-lucide="arrow-left"></i>
                    Back
                </a>
                <button type="submit" class="page-btn">
                    Next
                    <i data-lucide="arrow-right"></i>
                </button>
            </div>

        </div>
        </form>

    </div>

    <script>
        lucide.createIcons();
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const isActive = btn.classList.contains('active');
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                if (!isActive) {
                    btn.classList.add('active');
                    document.getElementById('dream-type').value = btn.textContent.trim();
                } else {
                    document.getElementById('dream-type').value = '';
                }
            });
        });
    </script>
</body>
</html>
