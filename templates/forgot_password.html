<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>

    <link rel="stylesheet" href="{{url_for('static' ,filename='login.css')}}">
</head>
<body>

    <main>
        <div class="login-box">
            <a href="{{ url_for('login') }}" class="back-link">← Back</a>
            <h2>Forgot Password</h2>

            {% if msg %}
            <p class="msg">{{msg}}</p>
            {% endif %}

            <p>Please enter your email address and we will send you a link to reset your password</p>

            <form action="/forgot_password" method="POST" style="display:contents;" novalidate>
                <label for="email"></label>
                <input type="email" placeholder="Email" name="email">

                <button>Send Reset Link</button>
            </form>

            <!-- <a href="{{ url_for('forgot_password') }}"></a> -->

        </div>
    </main>
    
</body>
</html>
