<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question 1 - DreamLab</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='q1.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="top-nav-icons">
        <a href="{{ url_for('dashboard') }}" class="nav-icon-btn" title="Home">
            <i data-lucide="home"></i>
        </a>
        <a href="{{ url_for('login') }}" class="nav-icon-btn" title="Log Out">
            <i data-lucide="log-out"></i>
        </a>
    </div>

    <div class="page-wrapper">

        <form method="POST" action="/q1">
        <div class="card">

            <p class="question-label">What part of the dream stands out most to you?</p>

            <div class="field-group">
                <label class="field-label">Please describe</label>
                <textarea class="dream-textarea" name="standout_moment" rows="6"></textarea>
            </div>

            <div class="pagination">
                <a href="{{ url_for('write_dream') }}" class="page-btn">
                    <i data-lucide="arrow-left"></i>
                    Back
                </a>
                <button type="submit" class="page-btn">
                    Next
                    <i data-lucide="arrow-right"></i>
                </button>
            </div>

        </div>
        </form>

    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
