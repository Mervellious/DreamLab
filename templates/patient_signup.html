<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Signup</title>

<link rel="stylesheet" href="{{ url_for('static', filename='patient_signup.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <main>
        <div class="signup-box">
            <a href="{{ url_for('create_account') }}" class="back-link">← Back</a>
            {% if msg %}
            <p class="msg">{{msg}}</p>
             {% endif %}

            
            <h2>Create Your Account</h2>

            <form action="/patient_signup" method="POST" novalidate>

              <label for="name"></label>
              <input type="text" placeholder="Name" name="name"required>

             <label for="surname"></label>
             <input type="text" placeholder="Surname" name="surname" required>

             <label for="email"></label>
             <input type="email" placeholder="Email" name="email" required>

             <label for="password"></label>
             <div class="password-input-wrapper">
                 <input type="password" placeholder="Create Password" name="password" class="input-field" id="patientCreatePwd" required>
                 <button type="button" class="toggle-password" onclick="togglePasswordVisibility('patientCreatePwd', this)">
                     <i data-lucide="eye" class="eye-icon"></i>
                 </button>
                 <span class="tooltip-wrapper">
                     <i data-lucide="info" class="info-icon"></i>
                     <div class="tooltip-box">
                         <p>Password must include:</p>
                         <ul>
                             <li>At least 6 characters</li>
                             <li>At least 1 number</li>
                             <li>At least 1 special character (e.g. @, !, #)</li>
                         </ul>
                     </div>
                 </span>
             </div>

            <label for="cpassword"></label>
            <div class="password-input-wrapper password-input-simple">
                <input type="password" placeholder="Confirm Password" name="cpassword" class="input-field" id="patientConfirmPwd" required>
                <button type="button" class="toggle-password" onclick="togglePasswordVisibility('patientConfirmPwd', this)">
                    <i data-lucide="eye" class="eye-icon"></i>
                </button>
            </div>

            <button>Continue</button>

         </form>

            <p class="have-account">Have an account ? <a href="{{ url_for('login') }}">Login</a></p>

        </div>

    </main>
    
    <script>
        lucide.createIcons();
        function togglePasswordVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('[data-lucide]');
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }
    </script>
</body>
</html>
